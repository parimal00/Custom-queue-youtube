services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: custom_queue_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      CONTAINER_ROLE: app
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: '${DB_DATABASE:-custom_queue}'
      DB_USERNAME: '${DB_USERNAME:-root}'
      DB_PASSWORD: '${DB_PASSWORD:-}'
    volumes:
      - '.:/var/www'
    networks:
      - custom_queue_network
    depends_on:
      - mysql

  nginx:
    image: 'nginx:alpine'
    container_name: custom_queue_nginx
    restart: unless-stopped
    ports:
      - '5000:80'
    volumes:
      - '.:/var/www'
      - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf'
    networks:
      - custom_queue_network
    depends_on:
      - app

  mysql:
    image: 'mysql:8.0'
    container_name: custom_queue_mysql
    ports:
      - '${FORWARD_DB_PORT:-3309}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: '${DB_DATABASE:-custom_queue}'
    volumes:
      - 'custom_queue_mysql_data:/var/lib/mysql'
    networks:
      - custom_queue_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$${DB_PASSWORD}\""]
      retries: 3
      timeout: 5s

networks:
  custom_queue_network:
    driver: bridge

volumes:
  custom_queue_mysql_data:
    driver: local

